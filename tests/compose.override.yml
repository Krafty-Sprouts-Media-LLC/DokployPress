# =============================================================================
# compose.override.yml
# KSM WPDokploystack — Local/CI test overrides (use with main docker-compose.yml)
#
# Publishes Nginx on TEST_HTTP_PORT (default 18080) for smoke tests.
#
# @package KSM-WPDokploystack
# @since   1.8.0
# =============================================================================

services:
  nginx:
    ports:
      - "${TEST_HTTP_PORT:-18080}:80"
